<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Ward emergency response map and planning site.">
  <title>Ward Emergency Response Map</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header id="configError" class="config-error" role="alert" hidden></header>

  <main class="app-shell" aria-label="Ward emergency response map">
    <div id="mapContainer" class="map-container" aria-live="polite">
      <p class="loading">Loading map…</p>
    </div>
  </main>

  <button class="fab fab-signup" id="openSignup" type="button" aria-label="Open sign-up form">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M4 4.75A2.75 2.75 0 0 1 6.75 2h6.54a2.75 2.75 0 0 1 1.95.81l2.95 2.95a2.75 2.75 0 0 1 .81 1.94v11.55A2.75 2.75 0 0 1 17.25 22H6.75A2.75 2.75 0 0 1 4 19.25V4.75Zm3.5 3.5a.75.75 0 0 0 0 1.5h9a.75.75 0 0 0 0-1.5h-9Zm0 4a.75.75 0 0 0 0 1.5h6a.75.75 0 0 0 0-1.5h-6Zm0 4a.75.75 0 0 0 0 1.5h4a.75.75 0 0 0 0-1.5h-4Z" fill="currentColor"/>
    </svg>
  </button>

  <button class="fab fab-info" id="openInfo" type="button" aria-label="Open ward emergency response plan">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 2.7a9.3 9.3 0 1 0 0 18.6 9.3 9.3 0 0 0 0-18.6Zm0 4.1a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4Zm1.3 10.4h-2.6v-1.3h.6v-4h-.6v-1.3h2v5.3h.6v1.3Z" fill="currentColor"/>
    </svg>
  </button>

  <section class="modal" id="signupModal" aria-hidden="true">
    <div class="modal__backdrop" data-close-modal="signupModal"></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="signupTitle">
      <div class="modal__header">
        <h2 class="modal__title" id="signupTitle">Ward Emergency Contact Sign-up</h2>
        <button class="close-btn" type="button" data-close-modal="signupModal" aria-label="Close sign-up modal">×</button>
      </div>
      <p class="help-text">Use the form below to join the ward emergency contact list.</p>

      <div id="signupContent" class="signup-content" aria-live="polite"></div>
    </div>
  </section>

  <section class="modal" id="infoModal" aria-hidden="true">
    <div class="modal__backdrop" data-close-modal="infoModal"></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
      <div class="modal__header">
        <button class="close-btn" type="button" data-close-modal="infoModal" aria-label="Close plan modal">×</button>
      </div>
      <div id="wardPlanContent" class="ward-plan" aria-live="polite">
        <p class="loading">Loading ward plan…</p>
      </div>
    </div>
  </section>

  <script src="./app.js" defer></script>
</body>
</html>
